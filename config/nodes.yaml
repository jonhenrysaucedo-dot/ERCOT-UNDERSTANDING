# Target node configuration — confirmed 2026-05-18
# ERCOT-registered name: RN_QTUM_SLR
# Read from this file in all src/ code. Never hard-code the node name.

target_node:
  ercot_settlement_point: RN_QTUM_SLR        # confirmed — do not change without re-running Phase 1
  confirmed: true                             # set to true after NP4-160-SG confirmed (done 2026-05-18)
  settlement_point_type: RN                   # Resource Node
  resource_type: solar                        # _SLR suffix per ERCOT naming convention
  zone: WEST                                  # ERCOT West Zone (West Texas)
  installed_mw: 160.0                         # nameplate PV capacity — caps M11 curtailment hedge
  note: >
    RN_QTUM_SLR is the solar-only resource node. The IP Quantum BESS battery
    project (queue 26INR0309, Haskell County) is a separate node and separate
    workstream. Do not assume they share a settlement point.

# Reference hubs for basis decomposition and proxy pricing
# Used when RN_QTUM_SLR history is < 90 days (backtest proxies to HB_WEST)
reference_hub: HB_WEST
system_hub: HB_HUBAVG

# Solar curtailment hedge parameters (M11)
# hedge_mw = min(pv_forecast_mw × coverage_ratio, installed_mw, max_position_mw)
curtailment_hedge:
  enabled: true
  trigger_prob: 0.30               # P(RT_LMP < rec_floor) threshold to activate hedge
  coverage_ratio: 0.80             # fraction of forecast PV output to hedge
  rec_floor_usd: -5.0              # below this RT LMP, operator curtails; hedge activates
  direction: INC                   # always INC (sell DAM / buy RT) — NOT DEC (see PRD §M11)

# West Texas weather stations for ASOS temperature data
# Source: Iowa State Mesonet ASOS archive (free, no auth)
weather_stations:
  - station: MAF
    name: Midland-Odessa International
    lat: 31.94
    lon: -102.20
    zone: WEST
    primary: true                  # closest to RN_QTUM_SLR site
  - station: LBB
    name: Lubbock Preston Smith International
    lat: 33.66
    lon: -101.82
    zone: WEST
    primary: false
  - station: SJT
    name: San Angelo Regional
    lat: 31.36
    lon: -100.50
    zone: WEST
    primary: false
  # Additional stations for zone-level features
  - station: DFW
    name: Dallas-Fort Worth International
    lat: 32.90
